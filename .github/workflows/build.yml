name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-desktop:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: EzVocab-linux
          - os: windows-latest
            artifact: EzVocab-windows.exe
          - os: macos-latest
            artifact: EzVocab-macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e ".[dev]" pyinstaller

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: pyinstaller --onefile --name EzVocab --add-data "src/ezvocab:ezvocab" main.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --name EzVocab --add-data "src/ezvocab;ezvocab" main.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          cache: true

      - name: Install dependencies
        run: pip install -e ".[dev]" flet

      - name: Build APK
        run: flet build apk

      - uses: actions/upload-artifact@v4
        with:
          name: EzVocab-android
          path: build/apk/

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          cache: true

      - name: Install dependencies
        run: pip install -e ".[dev]" flet

      - name: Build IPA
        run: flet build ipa

      - uses: actions/upload-artifact@v4
        with:
          name: EzVocab-ios
          path: build/ipa/
