name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-desktop:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: EzVocab-linux
            build_cmd: pyinstaller --onefile --name EzVocab --add-data "src/ezvocab:ezvocab" main.py
            dist_path: dist/
          - os: windows-latest
            artifact: EzVocab-windows.exe
            build_cmd: pyinstaller --onefile --name EzVocab --add-data "src/ezvocab;ezvocab" main.py
            dist_path: dist/
          - os: macos-latest
            artifact: EzVocab-macos
            build_cmd: flet build macos --arch arm64
            dist_path: build/macos/
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: subosito/flutter-action@v2
        if: runner.os == 'macOS'
        with:
          flutter-version: "3.41.7"
          cache: true

      - name: Install dependencies (Linux/Windows)
        if: runner.os != 'macOS'
        run: pip install -e ".[dev,desktop]" pyinstaller

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: pip install -e ".[dev,desktop]" flet

      - name: Build
        run: ${{ matrix.build_cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist_path }}

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: true

      - name: Install dependencies
        run: pip install -e ".[dev]" flet

      - name: Build APK
        run: flet build apk --arch arm64-v8a

      - uses: actions/upload-artifact@v4
        with:
          name: EzVocab-android
          path: build/apk/

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          cache: true

      - name: Install dependencies
        run: pip install -e ".[dev]" flet

      - name: Build IPA
        run: flet build ipa --arch arm64

      - uses: actions/upload-artifact@v4
        with:
          name: EzVocab-ios
          path: build/ipa/
